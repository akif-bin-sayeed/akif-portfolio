<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Portfolio App | Akif Bin Sayeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;950&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="app.css">
</head>
<body class="app-body">
  <div class="bg-grid"></div><div class="bg-orb orb-a"></div><div class="bg-orb orb-b"></div>
  <main id="loginView" class="login-shell">
    <section class="login-card card">
      <div class="logo">ABS</div>
      <div class="eyebrow">Private dashboard</div>
      <h1>Portfolio App</h1>
      <p>Login to update the website, upload images, edit floating labels, and read messages.</p>
      <form id="loginForm" class="form">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button class="btn primary" type="submit">Login</button>
      </form>
      <div id="loginNotice" class="notice error"></div>
    </section>
  </main>
  <main id="dashView" class="dash" hidden>
    <aside class="sidebar">
      <div class="side-brand"><div class="logo">ABS</div><div><strong>Portfolio App</strong><span>Mobile editor</span></div></div>
      <nav id="appNav" class="side-nav"></nav>
      <button id="seedBtn" class="side-btn">Seed starter content</button>
      <a class="side-btn" href="../" target="_blank">View site</a>
      <button id="logoutBtn" class="side-btn">Log out</button>
    </aside>
    <section class="workspace">
      <div class="workspace-head"><div><div class="eyebrow">Private Dashboard</div><h1 id="panelTitle">Profile</h1></div><button id="saveContentBtn" class="btn primary">Save content</button></div>
      <div id="globalNotice" class="notice"></div>
      <div id="panel"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/default-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
