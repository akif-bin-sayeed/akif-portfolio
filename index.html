<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portfolio of Akif Bin Sayeed">
  <title>Akif Bin Sayeed | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850;950&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="bg-grid"></div><div class="bg-orb orb-a"></div><div class="bg-orb orb-b"></div><div class="bg-orb orb-c"></div><div id="progress" class="progress"></div>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="#top" aria-label="Home">
        <span id="brandLogo" class="logo">ABS</span>
        <span><span id="brandName" class="brand-name">Akif Bin Sayeed</span><br><span id="brandSub" class="brand-sub">Research / GIS / Leadership</span></span>
      </a>
      <button id="mobileMenu" class="menu-btn">Menu</button>
      <div id="navLinks" class="links"></div>
    </nav>
  </header>
  <main id="top" class="container">
    <section class="hero">
      <div class="hero-copy reveal visible">
        <div id="heroEyebrow" class="eyebrow"></div>
        <div id="heroAvailability" class="availability"></div>
        <h1 id="heroTitle"></h1>
        <div id="heroHeadline" class="headline"></div>
        <p id="heroSummary" class="summary"></p>
        <div id="heroTags" class="tag-row"></div>
        <div id="heroButtons" class="hero-actions"></div>
      </div>
      <div id="heroVisual" class="hero-visual reveal visible">
        <div id="floatingLabels"></div>
        <div class="photo-card">
          <div id="visualCaption" class="visual-caption"></div>
          <div class="photo-frame">
            <img id="profilePhoto" class="profile-photo" alt="Profile photo">
            <div id="absPlaceholder" class="abs-placeholder">ABS</div>
          </div>
          <div class="visual-info">
            <h3 id="visualFooterTitle"></h3>
            <p id="visualFooterText"></p>
          </div>
        </div>
      </div>
    </section>
    <section id="about" class="section"></section>
    <div id="researchHighlights" class="section" style="padding-top:0"></div>
    <section id="experience" class="section"></section>
    <section id="projects" class="section"></section>
    <section id="skills" class="section"></section>
    <section id="certificates" class="section"></section>
    <section id="gallery" class="section"></section>
    <section id="posts" class="section"></section>
    <section id="contact" class="section"></section>
  </main>
  <footer id="footer" class="footer container"></footer>
  <div id="lightbox" class="lightbox"><button id="lightboxClose">Close</button><img id="lightboxImg" alt="Expanded image"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/default-data.js"></script>
  <script src="assets/js/public.js"></script>
</body>
</html>
